<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔐 ap1ph3x — Demo</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔐%3C/text%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --phos: #00ff41;
      --phos-dim: #00cc33;
      --phos-dark: #006611;
      --bg: #000a00;
      --bg-dark: #000500;
      --amber: #f6851b;
      --red: #ff4040;
    }
    
    body {
      background: var(--bg-dark);
      color: var(--phos);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    /* CRT screen */
    .crt-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      padding: 20px;
      overflow-y: auto;
    }
    
    /* Scanlines */
    .crt-screen::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.08) 0px,
        rgba(0,0,0,0.08) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 9999;
    }
    
    /* Flicker */
    .crt-screen::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 255, 65, 0.015);
      pointer-events: none;
      z-index: 9998;
      animation: flicker 0.15s infinite;
    }
    
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.96; }
      73% { opacity: 0.99; }
    }
    
    /* Vignette */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
      z-index: 9997;
    }
    
    /* Moving scan beam */
    .scan-beam {
      position: fixed;
      left: 0; right: 0;
      height: 4px;
      background: var(--phos);
      opacity: 0.06;
      pointer-events: none;
      z-index: 9996;
      animation: scan 6s linear infinite;
    }
    
    @keyframes scan {
      0% { top: 0; }
      100% { top: 100vh; }
    }
    
    /* Container */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px 0 60px;
    }
    
    /* Header */
    .header {
      text-align: center;
      padding: 30px 0;
      border-bottom: 1px solid var(--phos-dark);
      margin-bottom: 30px;
    }
    
    .header h1 {
      font-family: 'VT323', monospace;
      font-size: 3rem;
      color: var(--phos);
      text-shadow: 0 0 10px var(--phos-dim);
      letter-spacing: 4px;
      animation: glow 2s ease-in-out infinite;
    }
    
    @keyframes glow {
      0%, 100% { text-shadow: 0 0 10px var(--phos-dim); }
      50% { text-shadow: 0 0 20px var(--phos), 0 0 30px var(--phos-dim); }
    }
    
    .header .tagline {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-top: 8px;
    }
    
    .header .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
      flex-wrap: wrap;
    }
    
    .stat {
      font-size: 0.75rem;
      opacity: 0.6;
      padding: 4px 12px;
      border: 1px solid var(--phos-dark);
      border-radius: 3px;
    }
    
    .stat strong {
      color: var(--phos);
      opacity: 1;
    }
    
    /* Boot sequence */
    .boot {
      font-size: 0.8rem;
      line-height: 1.6;
      margin-bottom: 20px;
      opacity: 0.7;
    }
    
    .boot .line {
      opacity: 0;
      animation: bootIn 0.1s forwards;
    }
    
    @keyframes bootIn {
      to { opacity: 0.7; }
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--phos-dark);
    }
    
    .tab {
      padding: 10px 20px;
      background: transparent;
      color: var(--phos-dim);
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      transition: all 0.2s;
      margin-bottom: -2px;
    }
    
    .tab:hover {
      color: var(--phos);
    }
    
    .tab.active {
      color: var(--phos);
      border-bottom-color: var(--phos);
      text-shadow: 0 0 8px var(--phos-dim);
    }
    
    /* Panel */
    .panel {
      display: none;
    }
    
    .panel.active {
      display: block;
    }
    
    /* Search */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .search-bar input {
      flex: 1;
      background: var(--bg-dark);
      border: 1px solid var(--phos-dark);
      color: var(--phos);
      padding: 10px 14px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      border-radius: 3px;
    }
    
    .search-bar input:focus {
      border-color: var(--phos);
      box-shadow: 0 0 8px var(--phos-dim);
    }
    
    .search-bar select {
      background: var(--bg-dark);
      border: 1px solid var(--phos-dark);
      color: var(--phos);
      padding: 10px 14px;
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      border-radius: 3px;
      cursor: pointer;
    }
    
    /* API grid */
    .api-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    
    .api-card {
      background: rgba(0, 255, 65, 0.03);
      border: 1px solid var(--phos-dark);
      padding: 12px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .api-card:hover {
      border-color: var(--phos);
      background: rgba(0, 255, 65, 0.06);
      box-shadow: 0 0 12px rgba(0, 255, 65, 0.1);
    }
    
    .api-card .name {
      font-weight: 700;
      font-size: 0.9rem;
      min-width: 180px;
    }
    
    .api-card .desc {
      font-size: 0.75rem;
      opacity: 0.6;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .api-card .auth-badge {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 3px;
      white-space: nowrap;
      font-weight: 700;
    }
    
    .auth-none { background: rgba(0,255,65,0.15); color: var(--phos); }
    .auth-apikey { background: rgba(246,133,27,0.15); color: var(--amber); }
    .auth-oauth { background: rgba(100,150,255,0.15); color: #6496ff; }
    .auth-opensource { background: rgba(255,64,64,0.15); color: var(--red); }
    
    .api-card .cat-badge {
      font-size: 0.65rem;
      opacity: 0.4;
      white-space: nowrap;
    }
    
    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      align-items: center;
    }
    
    .pagination button {
      background: transparent;
      border: 1px solid var(--phos-dark);
      color: var(--phos);
      padding: 6px 14px;
      font-family: inherit;
      cursor: pointer;
      border-radius: 3px;
      font-size: 0.8rem;
    }
    
    .pagination button:hover {
      background: rgba(0,255,65,0.1);
      border-color: var(--phos);
    }
    
    .pagination button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .pagination .info {
      font-size: 0.75rem;
      opacity: 0.5;
    }
    
    /* Wallet panel */
    .wallet-box {
      background: rgba(0,255,65,0.03);
      border: 1px solid var(--phos-dark);
      border-radius: 6px;
      padding: 24px;
      margin-bottom: 20px;
    }
    
    .wallet-box h3 {
      font-size: 1rem;
      margin-bottom: 16px;
      color: var(--phos);
    }
    
    .wallet-field {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      align-items: center;
    }
    
    .wallet-field label {
      font-size: 0.75rem;
      opacity: 0.5;
      min-width: 100px;
    }
    
    .wallet-field input, .wallet-field select {
      flex: 1;
      background: var(--bg-dark);
      border: 1px solid var(--phos-dark);
      color: var(--phos);
      padding: 8px 12px;
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      border-radius: 3px;
    }
    
    .wallet-field input:focus, .wallet-field select:focus {
      border-color: var(--phos);
    }
    
    .btn {
      background: rgba(0,255,65,0.1);
      border: 1px solid var(--phos);
      color: var(--phos);
      padding: 10px 24px;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .btn:hover {
      background: rgba(0,255,65,0.2);
      box-shadow: 0 0 12px rgba(0,255,65,0.2);
    }
    
    .btn:active {
      transform: scale(0.98);
    }
    
    .btn-amber {
      border-color: var(--amber);
      color: var(--amber);
      background: rgba(246,133,27,0.1);
    }
    
    .btn-amber:hover {
      background: rgba(246,133,27,0.2);
      box-shadow: 0 0 12px rgba(246,133,27,0.2);
    }
    
    /* Terminal output */
    .terminal {
      background: var(--bg-dark);
      border: 1px solid var(--phos-dark);
      border-radius: 6px;
      padding: 16px;
      font-size: 0.8rem;
      line-height: 1.7;
      min-height: 200px;
      max-height: 500px;
      overflow-y: auto;
      margin-top: 16px;
    }
    
    .terminal .term-line {
      opacity: 0;
      animation: termIn 0.05s forwards;
    }
    
    @keyframes termIn {
      to { opacity: 1; }
    }
    
    .terminal .prompt {
      color: var(--phos-dim);
    }
    
    .terminal .ok {
      color: var(--phos);
    }
    
    .terminal .err {
      color: var(--red);
    }
    
    .terminal .warn {
      color: var(--amber);
    }
    
    .terminal .dim {
      opacity: 0.5;
    }
    
    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--phos);
      animation: blink 1s steps(2) infinite;
      vertical-align: text-bottom;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    
    /* Payment flow */
    .flow-step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 0;
      border-bottom: 1px solid rgba(0,255,65,0.1);
      opacity: 0;
      transform: translateX(-10px);
      animation: flowIn 0.3s forwards;
    }
    
    @keyframes flowIn {
      to { opacity: 1; transform: translateX(0); }
    }
    
    .flow-step .num {
      font-family: 'VT323', monospace;
      font-size: 1.5rem;
      color: var(--phos-dim);
      min-width: 30px;
    }
    
    .flow-step .content {
      flex: 1;
    }
    
    .flow-step .title {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .flow-step .detail {
      font-size: 0.75rem;
      opacity: 0.6;
      font-family: monospace;
      word-break: break-all;
    }
    
    .flow-step.pending .num { color: var(--amber); }
    .flow-step.success .num { color: var(--phos); }
    .flow-step.success .title { color: var(--phos); }
    .flow-step.error .num { color: var(--red); }
    
    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: rgba(0,255,65,0.03);
      border: 1px solid var(--phos-dark);
      padding: 16px;
      border-radius: 6px;
      text-align: center;
    }
    
    .stat-card .num {
      font-family: 'VT323', monospace;
      font-size: 2.2rem;
      color: var(--phos);
      text-shadow: 0 0 8px var(--phos-dim);
    }
    
    .stat-card .label {
      font-size: 0.7rem;
      opacity: 0.5;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    /* Category list */
    .cat-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .cat-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 14px;
      background: rgba(0,255,65,0.02);
      border: 1px solid var(--phos-dark);
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .cat-item:hover {
      border-color: var(--phos);
      background: rgba(0,255,65,0.06);
    }
    
    .cat-item .count {
      opacity: 0.5;
      font-weight: 700;
    }
    
    /* Responsive */
    @media (max-width: 600px) {
      .header h1 { font-size: 2rem; }
      .api-card { flex-direction: column; align-items: flex-start; gap: 4px; }
      .api-card .name { min-width: auto; }
      .api-card .desc { white-space: normal; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--phos-dark); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--phos-dim); }
  </style>
</head>
<body>
  <div class="crt-screen">
    <div class="vignette"></div>
    <div class="scan-beam"></div>
    
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>🔐 ap1ph3x</h1>
        <div class="tagline">API + CIPHER + HEX — The encrypted payment protocol for AI agents</div>
        <div class="stats">
          <div class="stat"><strong>1779</strong> APIs</div>
          <div class="stat"><strong>53</strong> Categories</div>
          <div class="stat"><strong>739</strong> Free</div>
          <div class="stat"><strong>6</strong> Chains</div>
          <div class="stat"><strong>2</strong> Protocols</div>
        </div>
      </div>
      
      <!-- Boot sequence -->
      <div class="boot" id="boot"></div>
      
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="registry">📦 Registry</button>
        <button class="tab" data-tab="wallet">👛 Wallet</button>
        <button class="tab" data-tab="payment">💳 Payment Flow</button>
        <button class="tab" data-tab="stats">📊 Stats</button>
      </div>
      
      <!-- ═══ REGISTRY PANEL ═══ -->
      <div class="panel active" id="panel-registry">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Search 1779 APIs... (e.g. crypto, ai, weather)" />
          <select id="category-filter">
            <option value="">All categories</option>
          </select>
          <select id="auth-filter">
            <option value="">All auth</option>
            <option value="none">Free (no auth)</option>
            <option value="apikey">API Key</option>
            <option value="oauth">OAuth</option>
            <option value="opensource">Open Source</option>
          </select>
        </div>
        <div class="api-grid" id="api-grid"></div>
        <div class="pagination" id="pagination"></div>
      </div>
      
      <!-- ═══ WALLET PANEL ═══ -->
      <div class="panel" id="panel-wallet">
        <div class="wallet-box">
          <h3>⚡ Wallet Configuration</h3>
          <div class="wallet-field">
            <label>Chain</label>
            <select id="wallet-chain">
              <option value="base">Base (8453)</option>
              <option value="ethereum">Ethereum (1)</option>
              <option value="tempo">Tempo (5042)</option>
              <option value="polygon">Polygon (137)</option>
              <option value="monad">Monad Testnet (10143)</option>
              <option value="bsc">BSC (56)</option>
            </select>
          </div>
          <div class="wallet-field">
            <label>Max / call</label>
            <input type="number" id="wallet-max-call" value="0.01" step="0.001" min="0" /> USDC
          </div>
          <div class="wallet-field">
            <label>Max / day</label>
            <input type="number" id="wallet-max-day" value="10.00" step="0.5" min="0" /> USDC
          </div>
          <div style="margin-top: 16px; display: flex; gap: 10px;">
            <button class="btn" id="wallet-init">⚡ Init Wallet</button>
            <button class="btn btn-amber" id="wallet-export">📋 Export Config</button>
          </div>
        </div>
        <div class="terminal" id="wallet-terminal">
          <div class="term-line dim">> Waiting for wallet initialization...</div>
          <span class="cursor"></span>
        </div>
      </div>
      
      <!-- ═══ PAYMENT FLOW PANEL ═══ -->
      <div class="panel" id="panel-payment">
        <div class="wallet-box">
          <h3>💳 Simulated Payment Flow</h3>
          <div class="wallet-field">
            <label>API URL</label>
            <input type="text" id="pay-url" value="https://api.exa.ai/search" />
          </div>
          <div class="wallet-field">
            <label>Method</label>
            <select id="pay-method">
              <option value="GET">GET</option>
              <option value="POST">POST</option>
            </select>
          </div>
          <div class="wallet-field">
            <label>Protocol</label>
            <select id="pay-protocol">
              <option value="auto">Auto-detect</option>
              <option value="x402">x402</option>
              <option value="mpp">MPP</option>
            </select>
          </div>
          <div class="wallet-field">
            <label>Amount</label>
            <input type="number" id="pay-amount" value="0.01" step="0.001" /> USDC
          </div>
          <div style="margin-top: 16px;">
            <button class="btn" id="pay-execute">🚀 Execute Payment</button>
          </div>
        </div>
        <div id="payment-flow"></div>
        <div class="terminal" id="payment-terminal" style="margin-top: 16px;"></div>
      </div>
      
      <!-- ═══ STATS PANEL ═══ -->
      <div class="panel" id="panel-stats">
        <div class="stats-grid" id="stats-grid"></div>
        <h3 style="margin-bottom: 12px; font-size: 0.9rem; opacity: 0.7;">📂 Categories (53)</h3>
        <div class="cat-list" id="cat-list"></div>
      </div>
    </div>
  </div>

  <script>
    // ═══ DATA — Embedded from ap1ph3x registry ═══
    // This is a subset for the demo. The full registry has 1779 APIs.
    
    // We'll generate a representative sample from the actual SDK data
    const APIS = [
      // Crypto
      { id: 'coingecko', name: 'CoinGecko', category: 'cryptocurrency', url: 'https://api.coingecko.com/api/v3', authMethod: 'apikey', description: 'Crypto prices, market data, trending coins' },

      { id: 'binance', name: 'Binance', category: 'cryptocurrency', url: 'https://binance-docs.github.io/apidocs', authMethod: 'apikey', description: 'Crypto exchange trading data' },
      { id: 'coinbase', name: 'Coinbase', category: 'cryptocurrency', url: 'https://api.coinbase.com/v2', authMethod: 'apikey', description: 'Crypto exchange and wallet API' },
      { id: 'kraken', name: 'Kraken', category: 'cryptocurrency', url: 'https://api.kraken.com', authMethod: 'apikey', description: 'Crypto exchange market data' },
      { id: 'bitfinex', name: 'Bitfinex', category: 'cryptocurrency', url: 'https://api-pub.bitfinex.com/v2', authMethod: 'none', description: 'Crypto exchange ticker data' },
      { id: 'coinpaprika', name: 'Coinpaprika', category: 'cryptocurrency', url: 'https://api.coinpaprika.com/v1', authMethod: 'none', description: 'Crypto market data. Free, no key' },
      { id: 'crypto-compare', name: 'CryptoCompare', category: 'cryptocurrency', url: 'https://min-api.cryptocompare.com', authMethod: 'apikey', description: 'Crypto price comparison and historical data' },
      { id: 'onchain-gas', name: 'ETH Gas Station', category: 'cryptocurrency', url: 'https://ethgasstation.info/api', authMethod: 'apikey', description: 'Ethereum gas price estimates' },
      { id: 'mempool-space', name: 'Mempool.space', category: 'cryptocurrency', url: 'https://mempool.space/api', authMethod: 'none', description: 'Bitcoin mempool and blockchain data' },
      
      // AI / ML
      { id: 'huggingface', name: 'Hugging Face', category: 'machine-learning', url: 'https://api-inference.huggingface.co', authMethod: 'apikey', description: 'Free inference for 100K+ models. Text, image, audio' },
      { id: 'ollama', name: 'Ollama', category: 'machine-learning', url: 'http://localhost:11434/api', authMethod: 'none', description: 'Run LLMs locally. Open-source. Full privacy' },

      // Search
      { id: 'duckduckgo', name: 'DuckDuckGo', category: 'open-data', url: 'https://api.duckduckgo.com/', authMethod: 'none', description: 'Free instant answer API. No key, no tracking' },
      { id: 'wikipedia', name: 'Wikipedia API', category: 'open-data', url: 'https://en.wikipedia.org/w/api.php', authMethod: 'none', description: 'Free Wikipedia article search and retrieval' },

      // Social
      { id: 'hn-api', name: 'Hacker News', category: 'social', url: 'https://hacker-news.firebaseio.com/v0', authMethod: 'none', description: 'HN stories, comments, users. Free, no key' },

      // Weather / Location
      { id: 'open-meteo', name: 'Open-Meteo', category: 'weather', url: 'https://api.open-meteo.com/v1', authMethod: 'none', description: 'Free weather API. No key. 10K calls/day' },

      // Finance
      { id: 'alpha-vantage', name: 'Alpha Vantage', category: 'finance', url: 'https://www.alphavantage.co/query', authMethod: 'apikey', description: 'Stock market data, forex, crypto. Free tier' },
      { id: 'fred', name: 'FRED', category: 'finance', url: 'https://api.stlouisfed.org/fred', authMethod: 'apikey', description: 'Federal Reserve economic data' },
      { id: 'fixer', name: 'Fixer.io', category: 'currency-exchange', url: 'https://data.fixer.io/api', authMethod: 'apikey', description: 'Foreign exchange rates API' },
      { id: 'marketstack', name: 'Marketstack', category: 'finance', url: 'https://api.marketstack.com/v1', authMethod: 'apikey', description: 'Stock market data, 100K requests/mo free' },
      
      // Security
      { id: 'virustotal', name: 'VirusTotal', category: 'security', url: 'https://www.virustotal.com/api/v3', authMethod: 'apikey', description: 'Malware and URL scanning' },
      { id: 'haveibeenpwned', name: 'HaveIBeenPwned', category: 'security', url: 'https://haveibeenpwned.com/api/v3', authMethod: 'apikey', description: 'Check if email has been breached' },
      
      // Animals (fun)
      { id: 'cat-facts', name: 'Cat Facts', category: 'animals', url: 'https://catfact.ninja', authMethod: 'none', description: 'Random cat facts. Free, no key' },
      { id: 'dog-facts', name: 'Dog Facts', category: 'animals', url: 'https://dukengn.github.io/Dog-facts-API', authMethod: 'none', description: 'Random dog facts. Free' },
      { id: 'dog-ceo', name: 'Dog CEO', category: 'animals', url: 'https://dog.ceo/dog-api', authMethod: 'none', description: 'Random dog images by breed. Free' },
      
      // Government
      { id: 'us-census', name: 'US Census', category: 'government', url: 'https://api.census.gov/data', authMethod: 'apikey', description: 'US Census demographic data' },
      { id: 'data-gov', name: 'Data.gov', category: 'government', url: 'https://catalog.data.gov/api/3', authMethod: 'none', description: 'US government open data. Free' },
      
      // News
      { id: 'newsapi', name: 'NewsAPI', category: 'news', url: 'https://newsapi.org/v2', authMethod: 'apikey', description: 'News headlines from 80K+ sources' },
      { id: 'nyt', name: 'NY Times', category: 'news', url: 'https://api.nytimes.com/svc', authMethod: 'apikey', description: 'New York Times articles and metadata' },
    ];
    
    const CHAINS = {
      base: { name: 'Base', chainId: 8453, usdc: true, native: 'ETH' },
      ethereum: { name: 'Ethereum', chainId: 1, usdc: true, native: 'ETH' },
      tempo: { name: 'Tempo', chainId: 5042, usdc: true, native: 'ETH' },
      polygon: { name: 'Polygon', chainId: 137, usdc: true, native: 'MATIC' },
      monad: { name: 'Monad Testnet', chainId: 10143, usdc: false, native: 'MON' },
      bsc: { name: 'BSC', chainId: 56, usdc: true, native: 'BNB' },
    };
    
    // ═══ STATE ═══
    let currentPage = 1;
    const perPage = 15;
    let filteredApis = [...APIS];
    
    // ═══ BOOT SEQUENCE ═══
    const bootLines = [
      '> ap1ph3x v0.1.0 booting...',
      '> loading registry: 1779 APIs from 53 categories',
      '> loading chains: base, ethereum, tempo, polygon, monad, bsc',
      '> loading protocols: x402 ✅ mpp ✅',
      '> wallet: ready (zero custody)',
      '> spend caps: $0.01/call, $10.00/day',
      '> registry: 739 free APIs loaded',
      '> ap1ph3x ready. type to search.',
    ];
    
    const bootEl = document.getElementById('boot');
    bootLines.forEach((line, i) => {
      const div = document.createElement('div');
      div.className = 'line';
      div.style.animationDelay = (i * 0.15) + 's';
      div.textContent = line;
      bootEl.appendChild(div);
    });
    
    // ═══ TABS ═══
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      });
    });
    
    // ═══ REGISTRY ═══
    function renderApis() {
      const grid = document.getElementById('api-grid');
      const start = (currentPage - 1) * perPage;
      const pageApis = filteredApis.slice(start, start + perPage);
      
      grid.innerHTML = '';
      pageApis.forEach(api => {
        const card = document.createElement('div');
        card.className = 'api-card';
        card.innerHTML = `
          <div class="name">${api.name}</div>
          <div class="desc">${api.description}</div>
          <div class="cat-badge">${api.category}</div>
          <div class="auth-badge auth-${api.authMethod}">${api.authMethod === 'none' ? 'FREE' : api.authMethod.toUpperCase()}</div>
        `;
        card.addEventListener('click', () => {
          navigator.clipboard?.writeText(api.url);
          card.style.borderColor = '#00ff41';
          setTimeout(() => card.style.borderColor = '', 500);
        });
        grid.appendChild(card);
      });
      
      // Pagination
      const pagEl = document.getElementById('pagination');
      const totalPages = Math.ceil(filteredApis.length / perPage);
      pagEl.innerHTML = `
        <button onclick="prevPage()" ${currentPage === 1 ? 'disabled' : ''}>◀ PREV</button>
        <span class="info">Page ${currentPage}/${totalPages} — ${filteredApis.length} APIs</span>
        <button onclick="nextPage()" ${currentPage === totalPages ? 'disabled' : ''}>NEXT ▶</button>
      `;
    }
    
    window.prevPage = () => { if (currentPage > 1) { currentPage--; renderApis(); } };
    window.nextPage = () => {
      const totalPages = Math.ceil(filteredApis.length / perPage);
      if (currentPage < totalPages) { currentPage++; renderApis(); }
    };
    
    // Search
    function filterApis() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const cat = document.getElementById('category-filter').value;
      const auth = document.getElementById('auth-filter').value;
      
      filteredApis = APIS.filter(api => {
        const matchQ = !q || api.name.toLowerCase().includes(q) || api.description.toLowerCase().includes(q) || api.category.toLowerCase().includes(q);
        const matchCat = !cat || api.category === cat;
        const matchAuth = !auth || api.authMethod === auth;
        return matchQ && matchCat && matchAuth;
      });
      currentPage = 1;
      renderApis();
    }
    
    document.getElementById('search-input').addEventListener('input', filterApis);
    document.getElementById('auth-filter').addEventListener('change', filterApis);
    
    // Category filter
    const catFilter = document.getElementById('category-filter');
    const categories = [...new Set(APIS.map(a => a.category))].sort();
    categories.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat;
      opt.textContent = `${cat} (${APIS.filter(a => a.category === cat).length})`;
      catFilter.appendChild(opt);
    });
    catFilter.addEventListener('change', filterApis);
    
    // ═══ WALLET ═══
    document.getElementById('wallet-init').addEventListener('click', () => {
      const chain = document.getElementById('wallet-chain').value;
      const maxCall = document.getElementById('wallet-max-call').value;
      const maxDay = document.getElementById('wallet-max-day').value;
      const chainInfo = CHAINS[chain];
      
      // Generate a mock address
      const mockAddr = '0x' + Array.from({length: 40}, () => '0123456789abcdef'[Math.floor(Math.random() * 16)]).join('');
      
      const term = document.getElementById('wallet-terminal');
      term.innerHTML = '';
      
      const lines = [
        { t: 'prompt', text: '> ap1ph3x.init({' },
        { t: 'dim', text: `    chain: '${chain}',` },
        { t: 'dim', text: `    chainId: ${chainInfo.chainId},` },
        { t: 'dim', text: `    native: '${chainInfo.native}',` },
        { t: 'dim', text: `    maxPerCall: ${maxCall},` },
        { t: 'dim', text: `    maxPerDay: ${maxDay},` },
        { t: 'prompt', text: '  })' },
        { t: '', text: '' },
        { t: 'ok', text: '✅ Wallet initialized' },
        { t: 'dim', text: `   Address: ${mockAddr}` },
        { t: 'dim', text: `   Chain: ${chainInfo.name} (${chainInfo.chainId})` },
        { t: 'dim', text: `   USDC: ${chainInfo.usdc ? '✅ supported' : '❌ not available'}` },
        { t: 'dim', text: `   Spend cap: $${maxCall}/call, $${maxDay}/day` },
        { t: '', text: '' },
        { t: 'ok', text: '✅ Zero custody — key never leaves process' },
        { t: 'ok', text: '✅ x402 protocol ready' },
        { t: 'ok', text: '✅ MPP protocol ready' },
        { t: 'prompt', text: '> Ready to fetch APIs.' },
      ];
      
      lines.forEach((line, i) => {
        const div = document.createElement('div');
        div.className = 'term-line ' + line.t;
        div.style.animationDelay = (i * 0.08) + 's';
        div.textContent = line.text;
        term.appendChild(div);
      });
      
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      term.appendChild(cursor);
    });
    
    document.getElementById('wallet-export').addEventListener('click', () => {
      const chain = document.getElementById('wallet-chain').value;
      const maxCall = document.getElementById('wallet-max-call').value;
      const maxDay = document.getElementById('wallet-max-day').value;
      
      const config = `import { Ap1ph3x } from 'ap1ph3x';

const pay = new Ap1ph3x({
  privateKey: process.env.PRIVATE_KEY,
  chain: '${chain}',
  maxPerCall: ${maxCall},
  maxPerDay: ${maxDay},
});`;
      
      navigator.clipboard?.writeText(config);
      const term = document.getElementById('wallet-terminal');
      const div = document.createElement('div');
      div.className = 'term-line ok';
      div.textContent = '✅ Config copied to clipboard!';
      term.appendChild(div);
    });
    
    // ═══ PAYMENT FLOW ═══
    document.getElementById('pay-execute').addEventListener('click', async () => {
      const url = document.getElementById('pay-url').value;
      const method = document.getElementById('pay-method').value;
      const protocol = document.getElementById('pay-protocol').value;
      const amount = document.getElementById('pay-amount').value;
      
      const flowEl = document.getElementById('payment-flow');
      const termEl = document.getElementById('payment-terminal');
      flowEl.innerHTML = '';
      termEl.innerHTML = '';
      
      const steps = [
        { num: '1', title: 'Request', detail: `${method} ${url}`, status: 'pending' },
        { num: '2', title: '402 Payment Required', detail: 'Server demands payment for access', status: 'pending' },
        { num: '3', title: 'Parse challenge', detail: `Protocol: ${protocol === 'auto' ? 'x402 (auto-detected)' : protocol}`, status: 'pending' },
        { num: '4', title: 'Sign EIP-712', detail: `Amount: ${amount} USDC → signing with wallet key...`, status: 'pending' },
        { num: '5', title: 'Retry with payment', detail: `Authorization: EIP-712 signature attached`, status: 'pending' },
        { num: '6', title: '200 OK', detail: `Payment settled — ${amount} USDC transferred`, status: 'pending' },
      ];
      
      for (let i = 0; i < steps.length; i++) {
        const step = steps[i];
        const div = document.createElement('div');
        div.className = `flow-step ${step.status}`;
        div.style.animationDelay = (i * 0.1) + 's';
        div.innerHTML = `
          <div class="num">${step.num}</div>
          <div class="content">
            <div class="title">${step.title}</div>
            <div class="detail">${step.detail}</div>
          </div>
        `;
        flowEl.appendChild(div);
        
        await new Promise(r => setTimeout(r, 500));
        div.classList.remove('pending');
        div.classList.add('success');
        
        // Terminal output
        const termLine = document.createElement('div');
        termLine.className = 'term-line';
        termLine.style.animationDelay = '0s';
        if (i === 0) termLine.classList.add('prompt');
        else if (i === 1) termLine.classList.add('warn');
        else if (i === 5) termLine.classList.add('ok');
        else termLine.classList.add('dim');
        
        const texts = [
          `> ${method} ${url}`,
          `⚠ 402 Payment Required`,
          `> parsing challenge... protocol: ${protocol === 'auto' ? 'x402' : protocol}`,
          `> signing EIP-712 TransferWithAuthorization...`,
          `> retry with payment header...`,
          `✅ 200 OK — payment settled (${amount} USDC)`,
        ];
        termLine.textContent = texts[i];
        termEl.appendChild(termLine);
      }
      
      // Final terminal line
      const finalLine = document.createElement('div');
      finalLine.className = 'term-line ok';
      finalLine.textContent = '';
      termEl.appendChild(finalLine);
      
      const summary = document.createElement('div');
      summary.className = 'term-line ok';
      summary.textContent = `═══ Payment complete ═══`;
      termEl.appendChild(summary);
      
      const detail = document.createElement('div');
      detail.className = 'term-line dim';
      detail.textContent = `   Amount: ${amount} USDC | Protocol: ${protocol === 'auto' ? 'x402' : protocol} | Status: SETTLED`;
      termEl.appendChild(detail);
    });
    
    // ═══ STATS ═══
    function renderStats() {
      const grid = document.getElementById('stats-grid');
      const stats = [
        { num: '1779', label: 'Total APIs' },
        { num: '739', label: 'Free APIs' },
        { num: '53', label: 'Categories' },
        { num: '6', label: 'Chains' },
        { num: '2', label: 'Protocols' },
        { num: '78', label: 'Open Source' },
        { num: '149', label: 'OAuth APIs' },
        { num: '200', label: 'AI Agents' },
      ];
      
      grid.innerHTML = '';
      stats.forEach(s => {
        const card = document.createElement('div');
        card.className = 'stat-card';
        card.innerHTML = `<div class="num">${s.num}</div><div class="label">${s.label}</div>`;
        grid.appendChild(card);
      });
      
      // Categories
      const catList = document.getElementById('cat-list');
      const catCounts = {};
      APIS.forEach(a => { catCounts[a.category] = (catCounts[a.category] || 0) + 1; });
      
      const sortedCats = Object.entries(catCounts).sort((a, b) => b[1] - a[1]);
      catList.innerHTML = '';
      sortedCats.forEach(([cat, count]) => {
        const item = document.createElement('div');
        item.className = 'cat-item';
        item.innerHTML = `<span>${cat}</span><span class="count">${count}</span>`;
        item.addEventListener('click', () => {
          document.querySelector('.tab[data-tab="registry"]').click();
          document.getElementById('category-filter').value = cat;
          filterApis();
        });
        catList.appendChild(item);
      });
    }
    
    // ═══ INIT ═══
    renderApis();
    renderStats();
  </script>
