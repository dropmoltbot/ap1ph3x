<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
  <defs>
    <filter id="glow-key"><feGaussianBlur stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#glow-key)" fill="none" stroke="#00ff41" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Key ring -->
    <circle cx="8" cy="8" r="5" fill="none">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Inner pulse -->
    <circle cx="8" cy="8" r="2" fill="#00ff41" fill-opacity="0.1">
      <animate attributeName="r" values="1.5;2.5;1.5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.05;0.3;0.05" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Key shaft -->
    <line x1="12" y1="12" x2="22" y2="22" fill="none">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </line>
    <!-- Teeth -->
    <line x1="18" y1="20" x2="20" y2="18" fill="none">
      <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="20" y1="22" x2="22" y2="20" fill="none">
      <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </line>
    <!-- Rotation spark -->
    <circle cx="8" cy="3" r="0.6" fill="#f6851b">
      <animateTransform attributeName="transform" type="rotate" from="0 8 8" to="360 8 8" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>