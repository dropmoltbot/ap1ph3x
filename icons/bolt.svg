<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
  <defs>
    <filter id="glow-bolt"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#glow-bolt)">
    <path d="M13 2L4 14h6l-2 8l10-12h-6l1-8z" fill="#00ff41" stroke="#00ff41" stroke-width="0.5">
      <animate attributeName="fill-opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
    </path>
    <!-- Spark particles -->
    <circle cx="13" cy="2" r="0.8" fill="#00ff41">
      <animate attributeName="fill-opacity" values="0;1;0" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="0.5;1.5;0.5" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="18" cy="14" r="0.6" fill="#f6851b">
      <animate attributeName="fill-opacity" values="0;0.8;0" dur="1.2s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle cx="2" cy="14" r="0.6" fill="#f6851b">
      <animate attributeName="fill-opacity" values="0;0.8;0" dur="1.2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>
</svg>