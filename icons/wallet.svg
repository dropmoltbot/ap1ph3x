<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
  <defs>
    <filter id="glow-wallet"><feGaussianBlur stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#glow-wallet)" fill="none" stroke="#00ff41" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wallet body -->
    <rect x="3" y="6" width="18" height="14" rx="2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Flap -->
    <path d="M3 6V5a2 2 0 0 1 2-2h12" fill="none">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <!-- Card slot -->
    <rect x="6" y="9" width="8" height="3" rx="0.5" stroke-width="1" stroke="#f6851b" fill="#f6851b" fill-opacity="0.05">
      <animate attributeName="stroke-opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
    </rect>
    <!-- Coin slot opening -->
    <circle cx="17" cy="13" r="3" stroke="#00ff41" fill="none" stroke-width="1.5">
      <animate attributeName="r" values="2.5;3.5;2.5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- USDC label -->
    <text x="17" y="14.5" font-family="monospace" font-size="4" fill="#00ff41" text-anchor="middle">
      <animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
      $
    </text>
    <!-- Pulse ring -->
    <circle cx="17" cy="13" r="5" stroke="#00ff41" stroke-width="0.5" fill="none" opacity="0.3">
      <animate attributeName="r" values="3;8;3" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>