<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
  <defs>
    <filter id="glow-robot"><feGaussianBlur stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#glow-robot)" fill="#00ff41" fill-opacity="0.1" stroke="#00ff41" stroke-width="2">
    <!-- Head -->
    <rect x="5" y="7" width="14" height="12" rx="2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    <!-- Antenna -->
    <line x1="12" y1="3" x2="12" y2="7" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <circle cx="12" cy="3" r="1.5" fill="#00ff41">
      <animate attributeName="fill-opacity" values="0.2;1;0.2" dur="1s" repeatCount="indefinite"/>
    </circle>
    <!-- Eyes -->
    <circle cx="9" cy="12" r="2" fill="#00ff41" fill-opacity="0.3">
      <animate attributeName="fill-opacity" values="0.1;0.8;0.1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="15" cy="12" r="2" fill="#00ff41" fill-opacity="0.3">
      <animate attributeName="fill-opacity" values="0.1;0.8;0.1" dur="2s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <!-- Pupils -->
    <circle cx="9" cy="12" r="0.8" fill="#00ff41">
      <animate attributeName="cy" values="12;11.5;12;12.5;12" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="15" cy="12" r="0.8" fill="#00ff41">
      <animate attributeName="cy" values="12;11.5;12;12.5;12" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Mouth -->
    <rect x="9" y="15.5" width="6" height="1" rx="0.5">
      <animate attributeName="width" values="6;4;6" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x" values="9;10;9" dur="3s" repeatCount="indefinite"/>
    </rect>
    <!-- Body hint -->
    <line x1="5" y1="19" x2="5" y2="21" stroke-width="1.5"/>
    <line x1="19" y1="19" x2="19" y2="21" stroke-width="1.5"/>
  </g>
</svg>