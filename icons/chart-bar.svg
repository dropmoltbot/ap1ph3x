<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
  <defs>
    <filter id="glow-chart"><feGaussianBlur stdDeviation="0.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#glow-chart)" fill="none" stroke="#00ff41" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Axes -->
    <line x1="4" y1="20" x2="20" y2="20" opacity="0.4"/>
    <line x1="4" y1="4" x2="4" y2="20" opacity="0.4"/>
    <!-- Bars growing -->
    <rect x="6" y="16" width="3" height="4" fill="#00ff41" fill-opacity="0.15" rx="0.5">
      <animate attributeName="height" values="4;4" dur="0.1s"/>
      <animate attributeName="fill-opacity" values="0.1;0.3;0.1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="10.5" y="12" width="3" height="8" fill="#00ff41" fill-opacity="0.2" rx="0.5">
      <animate attributeName="fill-opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    <rect x="15" y="8" width="3" height="12" fill="#00ff41" fill-opacity="0.25" rx="0.5">
      <animate attributeName="fill-opacity" values="0.1;0.5;0.1" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <!-- Trend line -->
    <polyline points="7.5,15 12,11 16.5,7" stroke="#f6851b" stroke-width="1.5" fill="none">
      <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </polyline>
    <!-- Data dot -->
    <circle cx="16.5" cy="7" r="1.5" fill="#f6851b">
      <animate attributeName="r" values="1;2;1" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Arrow up -->
    <path d="M16.5 7l-1 -2m1 2l1 -2" stroke="#f6851b" stroke-width="1.2" fill="none">
      <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>