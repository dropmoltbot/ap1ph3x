<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
  <defs>
    <filter id="glow-shield"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#glow-shield)" fill="none" stroke="#00ff41" stroke-width="2">
    <!-- Shield -->
    <path d="M12 2L4 5v6c0 5 3.5 9.5 8 11c4.5-1.5 8-6 8-11V5L12 2z">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <!-- Inner key pulse -->
    <circle cx="12" cy="12" r="3" fill="#00ff41" fill-opacity="0.1" stroke="#00ff41" stroke-width="1.5">
      <animate attributeName="r" values="2.5;3.5;2.5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.05;0.2;0.05" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Key teeth -->
    <line x1="12" y1="14" x2="12" y2="17" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="10.5" y1="15.5" x2="13.5" y2="15.5" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </line>
    <!-- Sparkle -->
    <circle cx="9" cy="8" r="0.8" fill="#00ff41">
      <animate attributeName="fill-opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="8;6;8" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>