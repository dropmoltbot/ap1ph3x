<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
  <defs>
    <filter id="glow-api"><feGaussianBlur stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#glow-api)" fill="none" stroke="#00ff41" stroke-width="2" stroke-linecap="round">
    <!-- Brackets -->
    <path d="M7 4L3 12l4 8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M17 4l4 8l-4 8">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Center transmission pulse -->
    <line x1="9" y1="12" x2="15" y2="12" stroke="#00ff41" stroke-width="1.5" stroke-dasharray="2 2">
      <animate attributeName="stroke-dashoffset" values="0;-4" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <!-- Data packets -->
    <circle cx="10" cy="12" r="1" fill="#00ff41">
      <animate attributeName="cx" values="9;15;9" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="14" cy="12" r="1" fill="#f6851b">
      <animate attributeName="cx" values="15;9;15" dur="3s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="fill-opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
  </g>
</svg>