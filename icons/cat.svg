<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
  <defs>
    <filter id="glow-cat"><feGaussianBlur stdDeviation="0.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#glow-cat)" fill="none" stroke="#00ff41" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cat body -->
    <ellipse cx="12" cy="16" rx="7" ry="5" fill="none">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Cat head -->
    <circle cx="12" cy="7" r="4" fill="none">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Ears -->
    <path d="M9 5L8 2M15 5l1-3" fill="none">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <!-- Eyes -->
    <circle cx="10.5" cy="7" r="0.8" fill="#00ff41">
      <animate attributeName="fill-opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="13.5" cy="7" r="0.8" fill="#00ff41">
      <animate attributeName="fill-opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="r" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <!-- Whiskers -->
    <line x1="9" y1="9" x2="5" y2="8.5" stroke-width="0.8">
      <animate attributeName="stroke-opacity" values="0.1;0.6;0.1" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="9" y1="10" x2="6" y2="10" stroke-width="0.8">
      <animate attributeName="stroke-opacity" values="0.1;0.6;0.1" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="15" y1="9" x2="19" y2="8.5" stroke-width="0.8">
      <animate attributeName="stroke-opacity" values="0.1;0.6;0.1" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="15" y1="10" x2="18" y2="10" stroke-width="0.8">
      <animate attributeName="stroke-opacity" values="0.1;0.6;0.1" dur="2s" repeatCount="indefinite"/>
    </line>
    <!-- Tail -->
    <path d="M19 16q3 0 2 -3" fill="none">
      <animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="d" values="M19 16q3 0 2 -3;M19 16q2 -1 1 -3;M19 16q3 0 2 -3" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>