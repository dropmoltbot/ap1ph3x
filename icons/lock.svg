<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
  <defs>
    <filter id="glow-lock">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad-lock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00ff41"/>
      <stop offset="1" stop-color="#00cc33"/>
    </linearGradient>
  </defs>
  <g filter="url(#glow-lock)">
    <!-- Lock body -->
    <rect x="5" y="11" width="14" height="10" rx="2" fill="none" stroke="url(#grad-lock)" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    <!-- Shackle -->
    <path d="M8 11V7a4 4 0 0 1 8 0v4" fill="none" stroke="url(#grad-lock)" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Keyhole -->
    <circle cx="12" cy="15" r="1.5" fill="#00ff41">
      <animate attributeName="fill-opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <line x1="12" y1="16" x2="12" y2="18" stroke="#00ff41" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>