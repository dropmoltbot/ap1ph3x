<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
  <defs>
    <filter id="glow-search"><feGaussianBlur stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#glow-search)" fill="none" stroke="#00ff41" stroke-width="2" stroke-linecap="round">
    <!-- Magnifier lens -->
    <circle cx="10.5" cy="10.5" r="6.5" fill="none">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Handle -->
    <line x1="15.5" y1="15.5" x2="21" y2="21" fill="none">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </line>
    <!-- Scan reticle -->
    <line x1="8" y1="8" x2="9" y2="8" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
    </line>
    <!-- Scan sweep -->
    <line x1="6" y1="10.5" x2="15" y2="10.5" stroke-width="0.8" stroke="#00ff41" opacity="0.5">
      <animate attributeName="y1" values="6;15;6" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="6;15;6" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <!-- Target dot -->
    <circle cx="10.5" cy="10.5" r="1" fill="#00ff41">
      <animate attributeName="fill-opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="6;15;6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>